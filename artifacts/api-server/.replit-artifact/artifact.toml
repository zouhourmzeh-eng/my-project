kind = "api"
previewPath = "/"
title = "QMS App"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "QMS Backend"
paths = ["/"]

[services.development]
run = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload"

[services.production]

[services.production.build]
args = ["bash", "-lc", "cd frontend && pnpm install --ignore-workspace && pnpm run build"]

[services.production.run]
args = ["bash", "-lc", "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 5000"]

[services.production.run.env]
PORT = "5000"

[services.production.health.startup]
path = "/api/health"
